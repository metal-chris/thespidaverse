[build]
  command = "npm run build"

[build.environment]
  # Exclude NEXT_PUBLIC_ env vars from secret scanning (they're meant to be public in Next.js)
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Environment variables (set in Netlify UI)
# NEXT_PUBLIC_SITE_URL
# NEXT_PUBLIC_SANITY_PROJECT_ID
# NEXT_PUBLIC_SANITY_DATASET
# NEXT_PUBLIC_SUPABASE_URL
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# UPSTASH_REDIS_REST_URL
# UPSTASH_REDIS_REST_TOKEN

# Redirect spida.world to thespidaverse.com
[[redirects]]
  from = "https://spida.world/*"
  to = "https://thespidaverse.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.spida.world/*"
  to = "https://thespidaverse.com/:splat"
  status = 301
  force = true

# Next.js handler (must be last)
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/___netlify-handler"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
